# DataRegistry runtime settings
# Do not store raw personal connection metadata unless explicitly needed.

database:
  # DataProvider database type (for example MYSQL).
  type: MYSQL
  profiles:
    # Connection profile for player-domain tables.
    # Must match [A-Za-z0-9._-]{1,64}.
    players:
      connection-id: player_data_rw
    # Connection profile for service-registry tables.
    # Must match [A-Za-z0-9._-]{1,64}.
    services:
      connection-id: player_data_rw

orm:
  # Schema mode controls ORM DDL behavior:
  # validate: verify schema only (recommended for production)
  # update: auto-apply additive changes (development/staging)
  # create: drop and recreate schema at startup (ephemeral/local only)
  # create-drop: create at startup, drop at shutdown (tests/local only)
  # none: disable ORM schema management (use external migrations)
  schema-mode: validate

privacy:
  # Persist player IP addresses in connection info.
  persist-ip-address: false
  # Persist player virtual host values in connection info.
  persist-virtual-host: false

features:
  # Toggle built-in data domains.
  # Disabled domains are not registered in ORM and will not receive writes.
  online-status: true
  connection-info: true
  sessions: true
  name-history: true
  service-registry: true

service-registry:
  # Heartbeat write interval for service instances (seconds, 5-300).
  heartbeat-interval-seconds: 30
  # Velocity backend-probe interval (seconds, 5-300).
  probe-interval-seconds: 15
  # Velocity backend-probe timeout (milliseconds, 200-10000).
  probe-timeout-millis: 1500

platform:
  bukkit:
    # Delay after join event before snapshotting status (ticks, 0-200).
    join-delay-ticks: 4
    # Backend logical service name; set to 'auto' to derive from host:port.
    service-name: auto
  velocity:
    # Proxy logical service name; set to 'auto' to derive from host:port.
    service-name: auto

validation:
  username:
    # Max persisted username length (1-32).
    max-length: 32
  server:
    # Max persisted server name length (1-64).
    max-length: 64
  virtual-host:
    # Max persisted virtual host length (1-255).
    max-length: 255
  ip:
    # Max persisted IP text length (7-45).
    max-length: 45
