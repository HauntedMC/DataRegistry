# DataRegistry runtime settings
# Do not store raw personal connection metadata unless explicitly needed.

database:
  type: MYSQL
  connection-id: player_data_rw

orm:
  schema-mode: validate

privacy:
  persist-ip-address: true
  persist-virtual-host: true

platform:
  bukkit:
    join-delay-ticks: 4

validation:
  username:
    max-length: 32
  server:
    max-length: 64
  virtual-host:
    max-length: 255
  ip:
    max-length: 45
