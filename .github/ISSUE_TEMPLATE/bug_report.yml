name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please provide enough detail for maintainers to reproduce quickly.
  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-check
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I tested on the latest available release.
          required: true
        - label: I removed secrets and sensitive data from logs and config snippets.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide minimal steps maintainers can follow.
      placeholder: |
        1. Configure ...
        2. Start ...
        3. Trigger ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: dataregistry_version
    attributes:
      label: DataRegistry Version
      placeholder: 1.x.x
    validations:
      required: true
  - type: input
    id: dataprovider_version
    attributes:
      label: DataProvider Version
      placeholder: 2.0.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Velocity
        - Bukkit/Paper
        - Both
        - Other
    validations:
      required: true
  - type: input
    id: platform_version
    attributes:
      label: Platform Version
      placeholder: "Velocity 3.x / Paper 1.21.x"
    validations:
      required: true
  - type: input
    id: java_version
    attributes:
      label: Java Version
      placeholder: "21"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Player identity
        - Online status
        - Connection info
        - Sessions
        - Name history
        - Service registry
        - Configuration / startup
        - Build / CI
        - Documentation
        - Other / Not sure
    validations:
      required: true
  - type: input
    id: database_type
    attributes:
      label: Database Type (Optional)
      placeholder: MYSQL
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Stacktrace (Optional)
      render: shell
      description: Paste only the relevant part.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional Context (Optional)
      description: Config snippets, screenshots, or other helpful details.
    validations:
      required: false
