# This workflow will build a package using Maven and then publish it to GitHub Packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package HauntedMC Plugin

on:
  push:
    tags:
      - v*

jobs:
  deploy:
    name: Deploy Distributables
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: ${{ secrets.GH_PACKAGE_REPO_USERNAME }}
          server-password: ${{ secrets.GH_PACKAGE_REPO_PASSWORD }}
          settings-path: ${{ github.workspace }}

      - name: Build with Maven
        run: mvn -B -Pgithub package --file pom.xml --settings ${{ github.workspace }}/settings.xml
        env:
          GITHUB_USER_REF: ${{ secrets.GH_PACKAGE_REPO_USERNAME }}
          GITHUB_TOKEN_REF: ${{ secrets.GH_PACKAGE_REPO_PASSWORD }}

      - name: Get Target Name
        run: bash ./scripts/get_target_name.sh

      - name: Upload Distributable Jar
        id: upload-final
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./target/${{ env.TARGET_NAME }}.jar

      - name: Publish to GitHub Packages Apache Maven
        run: mvn deploy --settings ${{ github.workspace }}/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGE_REPO_PASSWORD }}

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Set Release Variables
        run: bash ./scripts/set_release_ver.sh

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGE_REPO_PASSWORD }}
        with:
          name: ${{ env.VERSIONED_NAME }}
          body: ${{ env.GENERATED_CHANGELOG }}
          draft: false
          prerelease: false
          files: ./dist/${{ env.TARGET_NAME }}.jar
