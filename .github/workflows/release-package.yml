name: Release Package

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PACKAGES_USER: ${{ secrets.HAUNTEDMC_PACKAGES_USERNAME }}
      PACKAGES_TOKEN: ${{ secrets.HAUNTEDMC_PACKAGES_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate package token
        run: |
          if [ -z "$PACKAGES_USER" ]; then
            echo "Missing secret HAUNTEDMC_PACKAGES_USERNAME." >&2
            exit 1
          fi
          if [ -z "$PACKAGES_TOKEN" ]; then
            echo "Missing secret HAUNTEDMC_PACKAGES_TOKEN (requires read:packages and write:packages)." >&2
            exit 1
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: github
          server-username: PACKAGES_USER
          server-password: PACKAGES_TOKEN

      - name: Verify build
        run: mvn -U -B -ntp verify

      - name: Validate release version
        run: |
          PROJECT_VERSION="$(mvn -q -ntp -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Maven project version $PROJECT_VERSION." >&2
            exit 1
          fi

      - name: Upload platform distributables
        uses: actions/upload-artifact@v4
        with:
          name: dataregistry-platform-jars
          if-no-files-found: error
          path: |
            dataregistry-platform-velocity/target/dataregistry-platform-velocity-*-bundled.jar
            dataregistry-platform-paper/target/dataregistry-platform-paper-*-bundled.jar

      - name: Publish to GitHub Packages (Maven)
        run: mvn -U -B -ntp -DskipTests deploy

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: DataRegistry ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dataregistry-platform-velocity/target/dataregistry-platform-velocity-*-bundled.jar
            dataregistry-platform-paper/target/dataregistry-platform-paper-*-bundled.jar
