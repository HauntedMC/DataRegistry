name: Release Package

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve DataProvider version
        run: |
          VERSION=$(grep -A2 '<artifactId>dataprovider</artifactId>' pom.xml | grep '<version>' | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve DataProvider version from pom.xml" >&2
            exit 1
          fi
          echo "DATAPROVIDER_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Checkout DataProvider
        uses: actions/checkout@v6
        with:
          repository: HauntedMC/DataProvider
          ref: main
          path: .deps/DataProvider

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Verify DataProvider version
        working-directory: .deps/DataProvider
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [ "$VERSION" != "$DATAPROVIDER_VERSION" ]; then
            echo "DataProvider main is version $VERSION but DataRegistry expects $DATAPROVIDER_VERSION" >&2
            exit 1
          fi

      - name: Install DataProvider dependency
        working-directory: .deps/DataProvider
        run: mvn -B -ntp -DskipTests install

      - name: Verify build
        run: mvn -B -ntp verify

      - name: Resolve artifact name
        run: echo "TARGET_NAME=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.build.finalName)" >> "$GITHUB_ENV"

      - name: Upload distributable
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: target/${{ env.TARGET_NAME }}.jar

      - name: Publish to GitHub Packages (Maven)
        run: mvn -B -ntp -DskipTests deploy -s "$GITHUB_WORKSPACE/settings.xml"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: DataRegistry ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: target/${{ env.TARGET_NAME }}.jar
